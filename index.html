<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Streamline 3D — Gerenciador de Assets</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
    }
  }
  </script>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <div id="app">
    <aside id="sidebar">
      <div class="logo">Stream<span>line</span> 3D</div>
      <div id="categoryList"></div>
    </aside>

    <div id="main">
      <header id="header">
        <div class="filter-group">
          <select id="filterCategoria">
            <option value="todas">Todas as categorias</option>
          </select>
          <select id="filterLicenca">
            <option value="todas">Todas as licen&ccedil;as</option>
            <option value="cc0">CC0 (Dom&iacute;nio P&uacute;blico)</option>
            <option value="cc-by">CC BY (Atribui&ccedil;&atilde;o)</option>
            <option value="cc-by-sa">CC BY-SA (CompartilhaIgual)</option>
            <option value="cc-by-nc">CC BY-NC (N&atilde;oComercial)</option>
            <option value="royalty-free">Royalty Free</option>
          </select>
          <select id="filterOutros">
            <option value="todos">Outros filtros</option>
            <option value="download">Dispon&iacute;vel p/ download</option>
            <option value="animacao">Anima&ccedil;&atilde;o</option>
          </select>
          <select id="filterFormato">
            <option value="todos">Todos os formatos</option>
            <option value=".blend">.blend</option>
            <option value=".max">.max</option>
            <option value=".fbx">.fbx</option>
            <option value=".gltf">.gltf/.glb</option>
            <option value=".obj">.obj</option>
          </select>
        </div>
        <div class="toolbar">
          <button id="settingsBtn" title="Configurações">⚙</button>
          <button id="themeToggle" title="Alternar tema">🌙</button>
        </div>
      </header>

      <div id="gridWrapper">
        <div id="grid"></div>
      </div>
    </div>
  </div>

  <button id="importFab">
    <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
    Import Asset
  </button>

  <input type="file" id="fileInput" hidden accept=".blend,.obj,.fbx,.gltf,.glb,.max,.3ds,.stl,.dae,.ply,.stp" />

  <div id="contextOverlay"></div>
  <div id="contextMenu">
    <div class="ctx-item" data-action="view">
      <svg viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
      <span>Visualizar</span>
    </div>
    <div class="ctx-item ctx-convert" data-action="convert">
      <svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
      <span>Converter para glTF</span>
    </div>
    <div class="ctx-divider"></div>
    <div class="ctx-item danger" data-action="delete">
      <svg viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
      <span>Excluir</span>
    </div>
  </div>

  <div id="modalOverlay">
    <div id="modal">
      <div id="viewport">
        <button id="closeBtn">✕</button>

        <div id="toolbarModal">
          <button id="toolOpenIn" title="Abrir em programa externo">
            <svg viewBox="0 0 24 24"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
          </button>
          <div id="toolOpenInDropdown" class="toolbar-dropdown">
            <div class="dropdown-label">Abrir em</div>
            <div id="toolOpenInList"></div>
          </div>
        </div>

        <div id="assetInfo">
          <h2 id="modalAssetName">Modelo 3D</h2>
          <span id="modalAuthor"></span>
        </div>

        <div id="loadingOverlay">
          <div class="spinner"></div>
          <span class="loading-text">Carregando asset 3D…</span>
        </div>

        <div id="viewerMessage">
          <span class="msg-icon">📦</span>
          <span class="msg-text"></span>
          <div class="viewer-msg-actions">
            <button class="convert-btn" id="viewerConvertBtn">Converter para glTF</button>
            <button class="convert-btn secondary" id="viewerConfigBtn">⚙ Configurar Blender</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div id="importDialogOverlay">
    <div id="importDialog">
      <div class="dialog-header">
        <h3>Importar Asset</h3>
      </div>
      <div class="dialog-body">
        <div class="file-info">
          <span class="file-icon">📄</span>
          <div>
            <div class="file-name" id="dialogFileName">arquivo.blend</div>
            <div class="file-size" id="dialogFileSize">2.4 MB</div>
          </div>
        </div>
        <div class="field">
          <label for="dialogName">Nome</label>
          <input type="text" id="dialogName" placeholder="Nome do asset" />
        </div>
        <div class="field">
          <label for="dialogCategory">Categoria</label>
          <select id="dialogCategory"></select>
        </div>
        <div class="field">
          <label for="dialogLicense">Licen&ccedil;a</label>
          <select id="dialogLicense">
            <option value="cc0">CC0 (Dom&iacute;nio P&uacute;blico)</option>
            <option value="cc-by">CC BY (Atribui&ccedil;&atilde;o)</option>
            <option value="cc-by-sa" selected>CC BY-SA (CompartilhaIgual)</option>
            <option value="cc-by-nc">CC BY-NC (N&atilde;oComercial)</option>
            <option value="royalty-free">Royalty Free</option>
          </select>
        </div>
      </div>
      <div class="dialog-actions">
        <button id="dialogCancel">Cancelar</button>
        <button id="dialogConfirm">Importar</button>
      </div>
    </div>
  </div>

  <div id="settingsOverlay">
    <div id="settingsPanel">
      <div class="settings-header">
        <h3>Configurações</h3>
        <button id="settingsClose">✕</button>
      </div>
      <div class="settings-body">
        <div class="settings-section settings-external">
          <h4>Programas 3D Externos</h4>
          <p class="setting-note">Configure programas 3D para abrir assets diretamente.</p>
          <div id="settingsProgramList"></div>
          <div class="program-add-form">
            <input type="text" id="programName" placeholder="Nome (ex: Blender)" />
            <div class="program-path-row">
              <input type="text" id="programPath" placeholder="Ex: C:\Program Files\Blender Foundation\blender.exe" />
              <button id="programBrowseBtn" title="Selecionar executável">📁</button>
            </div>
            <button id="programAddBtn" class="settings-btn primary" disabled>Adicionar</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div id="toast"></div>

  <script type="module" src="js/controller.js"></script>
</body>
</html>
